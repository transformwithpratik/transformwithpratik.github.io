<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal — Sign In</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/portal.css">
</head>
<body>

<div class="admin-login">
  <form class="login-card" id="loginForm">
    <h2>Client<br><span class="yellow">Portal.</span></h2>
    <p style="color:var(--gray-light); margin: 0.5rem 0 2rem; font-family:var(--mono); font-size:0.85rem;">// SIGN IN TO ACCESS YOUR PLAN</p>

    <div class="login-error" id="loginError"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn btn-primary form-submit" id="submitBtn">Sign In <span class="arrow">→</span></button>

    <p style="margin-top:1.5rem; font-family:var(--mono); font-size:0.8rem; color:var(--gray-light); text-align:center;">
      New client? <a href="signup.html" style="color:var(--yellow);">Create account →</a>
    </p>
    <p style="margin-top:0.5rem; font-family:var(--mono); font-size:0.75rem; color:var(--gray-light); text-align:center;">
      <a href="../index.html" style="color:var(--gray-light);">← Back to home</a>
    </p>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('loginError');
  err.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = 'Signing in...';

  if (!supa) {
    err.textContent = 'Portal not configured. Contact Pratik.';
    err.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = 'Sign In →';
    return;
  }

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await Auth.signIn(email, password);
  if (error) {
    err.textContent = error.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = 'Sign In →';
    return;
  }

  // Check role — admins go to admin panel, clients to portal
  const profile = await Auth.getProfile();
  if (profile && profile.role === 'admin') {
    window.location.href = '../pages/admin.html';
  } else {
    window.location.href = 'dashboard.html';
  }
});
</script>

</body>
</html>
